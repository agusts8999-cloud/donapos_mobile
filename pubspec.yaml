name: donapos_mobile
description: "DonaPOS_Fnb_Plus - Mobile Application"
publish_to: 'none'
version: 2.8.0+10225

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8    
  provider: ^6.1.1
  http: ^1.2.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  blue_thermal_printer:
    path: ./packages/blue_thermal_printer
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  wakelock_plus: ^1.4.0
  url_launcher: ^6.2.5
  file_picker: ^8.1.5
  csv: ^6.0.0
  device_info_plus: ^10.0.0
  fl_chart: ^0.68.0
  qr_flutter: ^4.1.0
  image: ^4.2.0
  esc_pos_utils_plus: ^2.0.1
  image_cropper: ^8.0.2
  package_info_plus: ^9.0.0
  flutter_presentation_display: ^2.0.6
  carousel_slider: ^5.1.1
  workmanager: ^0.9.0+3
  disk_space_2: ^1.0.12
  geolocator: ^14.0.2
  bluetooth_print_plus: ^2.4.6
  print_bluetooth_thermal: ^1.1.9
  
  # Windows Desktop Support
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  flutter_pos_printer_platform_image_3:
    path: ./packages/flutter_pos_printer_platform_image_3

dependency_overrides:
  sqflite_android: 2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/payments/
